<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biometric OS</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="face-api.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050505] flex flex-col items-center justify-center min-h-screen text-slate-200">

    <header class="mb-10 text-center">
        <h1 class="text-[10px] uppercase tracking-[0.5em] text-slate-500" id="status-heading">
            System Authentication
        </h1>
    </header>

    <div class="relative">
        <div id="camera-frame" class="mockup-window border border-slate-800 bg-[#111] w-[320px] h-[440px] shadow-2xl overflow-hidden relative">
            <video id="webcam" class="w-full h-full object-cover" autoplay muted playsinline></video>
            
            <div id="denial-overlay" class="absolute inset-0 bg-red-950/90 backdrop-blur-md flex flex-col items-center justify-center p-8 opacity-0 pointer-events-none transition-all duration-500 z-20">
                <i data-lucide="shield-alert" class="w-12 h-12 text-red-500 mb-4"></i>
                <h2 class="text-xs font-bold text-red-100 uppercase tracking-widest mb-6">Access Denied</h2>
                <input type="password" id="backup-code-input" placeholder="Backup Code" class="input input-bordered w-full bg-black/40 text-center" />
            </div>
        </div>

        <div class="flex justify-center gap-6 mt-8">
            <div class="tooltip" data-tip="Refresh">
                <button class="btn btn-circle btn-ghost bg-slate-900 border border-slate-800" onclick="location.reload()">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="tooltip" data-tip="Emergency">
                <button class="btn btn-circle btn-ghost bg-slate-900 border border-slate-800">
                    <i data-lucide="zap" class="w-5 h-5 text-yellow-500"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
